<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MissAV Library{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f7fb;
            --surface: #ffffff;
            --ink: #182433;
            --muted: #5f6f82;
            --brand: #1155cc;
            --brand-strong: #0b3d99;
            --line: #d8e0eb;
            --chip: #e6eefc;
            --shadow: 0 14px 38px rgba(12, 37, 82, 0.12);
            --radius-lg: 18px;
            --radius-md: 12px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            color: var(--ink);
            background:
                radial-gradient(circle at 6% 8%, rgba(17, 85, 204, 0.1), transparent 28%),
                radial-gradient(circle at 92% 3%, rgba(14, 168, 122, 0.09), transparent 26%),
                var(--bg);
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        }

        .site-wrap {
            max-width: 1180px;
            margin: 0 auto;
            padding: 28px 20px 40px;
        }

        .hero {
            background: linear-gradient(122deg, #103777, #1155cc 52%, #0d6eb8);
            border-radius: 22px;
            padding: 22px 24px;
            color: #ecf3ff;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        .hero h1 {
            margin: 0;
            font-family: "Space Grotesk", sans-serif;
            font-size: clamp(1.4rem, 3vw, 2rem);
            letter-spacing: 0.02em;
        }

        .hero p {
            margin: 10px 0 0;
            color: #d8e7ff;
            font-size: 0.98rem;
        }

        .meta-line {
            color: var(--muted);
            margin: 0 0 16px;
            font-size: 0.95rem;
        }

        .search-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .search-row input[type="text"] {
            min-width: 280px;
            flex: 1;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.95rem;
            background: #fff;
            color: #23354f;
        }

        .search-row button,
        .jump-form button {
            border: 1px solid #0f4bbc;
            background: #0f4bbc;
            color: #fff;
            border-radius: 10px;
            padding: 9px 13px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .clear-link {
            color: #345682;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .tag-block {
            margin: 0 0 14px;
            background: #ffffffcc;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 10px 12px;
        }

        .tag-block summary {
            cursor: pointer;
            color: #1f3f6b;
            font-weight: 600;
            user-select: none;
        }

        .tag-list {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag-chip {
            text-decoration: none;
            border: 1px solid #c8dafb;
            background: #eff5ff;
            color: #24487b;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .tag-chip span {
            color: #4d6590;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .tag-chip.active {
            background: #0f4bbc;
            border-color: #0f4bbc;
            color: #fff;
        }

        .tag-chip.active span {
            color: #dce8ff;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            box-shadow: 0 10px 26px rgba(22, 48, 90, 0.08);
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: #9eb9ec;
            box-shadow: 0 16px 35px rgba(21, 58, 117, 0.18);
        }

        .cover-wrap {
            aspect-ratio: 800 / 538;
            background: linear-gradient(135deg, #e8edf8, #dbe8ff);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 0;
        }

        .cover-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .cover-fallback {
            font-family: "Space Grotesk", sans-serif;
            font-weight: 700;
            font-size: 1.6rem;
            color: #5f78a8;
            letter-spacing: 0.03em;
        }

        .card-body {
            padding: 12px 14px 15px;
        }

        .card-id {
            margin: 0;
            font-family: "Space Grotesk", sans-serif;
            font-size: 0.92rem;
            color: #0b3d99;
            word-break: break-word;
        }

        .card-title {
            margin: 7px 0 0;
            line-height: 1.35;
            font-size: 0.93rem;
            color: #283546;
            min-height: 2.6em;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .pager {
            margin-top: 24px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .jump-form {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-left: 6px;
        }

        .jump-form label {
            color: #395379;
            font-size: 0.88rem;
        }

        .jump-form input[type="number"] {
            width: 84px;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 0.9rem;
            color: #1f324d;
        }

        .pager a,
        .pager span {
            min-width: 40px;
            text-align: center;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 0.92rem;
            border: 1px solid var(--line);
            background: var(--surface);
            color: #294268;
            text-decoration: none;
        }

        .pager .current {
            background: #0f4bbc;
            border-color: #0f4bbc;
            color: #fff;
            font-weight: 600;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 14px;
            color: var(--brand);
            text-decoration: none;
            font-weight: 600;
        }

        .detail-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 20px;
            margin-bottom: 24px;
            width: 90%;
            max-width: 90vw;
            min-width: 0;
        }

        .detail-card .cover-wrap {
            border-radius: 12px;
        }

        .detail-id {
            margin: 0;
            color: var(--brand-strong);
            font-family: "Space Grotesk", sans-serif;
            font-size: 0.96rem;
            letter-spacing: 0.02em;
        }

        .detail-title {
            margin: 8px 0 0;
            font-family: "Space Grotesk", sans-serif;
            font-size: 18px;
            line-height: 1.35;
        }

        .detail-cover {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 1280 / 860;
            margin: 0;
        }

        .article-page {
            width: 90%;
            max-width: 90vw;
            min-width: 0;
        }

        .section-label {
            margin: 18px 0 8px;
            font-size: 0.84rem;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: #516a89;
            font-weight: 700;
        }

        .description {
            margin: 0;
            line-height: 1.65;
            color: #24364f;
            white-space: pre-wrap;
        }

        .keywords {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .keyword-chip {
            padding: 7px 10px;
            border-radius: 999px;
            background: var(--chip);
            border: 1px solid #c8dafb;
            color: #274876;
            font-size: 0.88rem;
        }

        .empty-box {
            border: 1px dashed #b8c7dc;
            border-radius: 12px;
            color: #5e728e;
            padding: 16px;
            background: #f8fbff;
        }

        @media (max-width: 820px) {
            .detail-card,
            .article-page {
                width: 92%;
                max-width: 92vw;
            }

            .site-wrap {
                padding: 18px 14px 32px;
            }

            .hero {
                padding: 18px;
                border-radius: 18px;
            }
        }
    </style>
</head>
<body>
<div class="site-wrap">
    {% block content %}{% endblock %}
</div>
</body>
</html>
